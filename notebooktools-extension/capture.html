<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Save to NotebookTools</title>
    <link rel="stylesheet" href="shared.css">
  </head>
  <body>
    <main class="app">
      <section class="card">
        <div class="brand">
          <span class="brand-mark">NT</span>
          <div>
            <h1>Save Selection</h1>
            <p>Choose an existing notebook or create a new one.</p>
          </div>
        </div>

        <label for="notebookSelect">Existing notebook</label>
        <select id="notebookSelect">
          <option value="">New notebook...</option>
        </select>

        <label for="newNotebookName">New notebook name</label>
        <input id="newNotebookName" type="text" placeholder="Example: Web research">

        <label for="captureTitle">Title</label>
        <input id="captureTitle" type="text">

        <label for="captureContent">Selected text</label>
        <textarea id="captureContent"></textarea>

        <button class="button" id="saveSelectionButton" type="button">
          Save to Notebook
        </button>

        <a class="button secondary" href="https://notebooklm.google.com/" target="_blank" rel="noreferrer">
          Open NotebookLM
        </a>

        <div class="status" id="status" role="status"></div>
        <p class="hint">
          This saves into NotebookTools local notebooks. You can open NotebookLM
          after saving to continue your research workflow.
        </p>
      </section>
    </main>

    <script src="storage.js"></script>
    <script src="capture.js"></script>
  </body>
</html>
