<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Import to NotebookLM</title>
    <link rel="stylesheet" href="shared.css">
  </head>
  <body>
    <main class="app embedded">
      <section class="card">
        <header class="import-header-compact">
          <img class="import-header-icon" src="icons/icon16.png" alt="" width="16" height="16">
          <div class="import-header-copy">
            <p class="import-header-title">Import to NotebookLM</p>
            <p id="videoTitle" class="import-header-meta">YouTube video</p>
          </div>
        </header>

        <input id="notebookSearch" type="search" placeholder="Search notebooks..." autocomplete="off" aria-label="Search notebooks">

        <select id="notebookLmSelect" aria-label="Notebook">
          <option value="">Loading notebooks...</option>
        </select>

        <input id="newNotebookLmName" type="text" placeholder="Or create new notebook" aria-label="New notebook name">

        <button class="button" id="importButton" type="button">Import</button>

        <div class="footer-row">
          <button class="text-button" id="refreshButton" type="button">Refresh</button>
          <a class="text-button" id="openNotebookLink" href="#" target="_blank" rel="noopener noreferrer" hidden>Open notebook</a>
        </div>

        <div class="status" id="status" role="status"></div>
      </section>
    </main>

    <script src="utils.js"></script>
    <script src="notebooklm-client.js"></script>
    <script src="notebook-picker.js"></script>
    <script src="youtube-import.js"></script>
  </body>
</html>
