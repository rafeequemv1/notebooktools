<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Import to NotebookLM</title>
    <link rel="stylesheet" href="shared.css">
  </head>
  <body>
    <main class="app embedded">
      <section class="card">
        <div class="brand">
          <img class="brand-logo" src="logo.png" alt="NotebookTools" width="148" height="18">
          <p id="videoTitle" class="video-title">YouTube video</p>
        </div>

        <label for="notebookLmSelect">Notebook</label>
        <select id="notebookLmSelect">
          <option value="">Loading notebooks...</option>
        </select>

        <p class="field-divider">or create new</p>

        <input id="newNotebookLmName" type="text" placeholder="Notebook name" aria-label="New notebook name">

        <button class="button" id="importButton" type="button">Import</button>

        <div class="footer-row">
          <button class="text-button" id="refreshButton" type="button">Refresh list</button>
        </div>

        <div class="status" id="status" role="status"></div>
      </section>
    </main>

    <script src="utils.js"></script>
    <script src="notebooklm-client.js"></script>
    <script src="youtube-import.js"></script>
  </body>
</html>
