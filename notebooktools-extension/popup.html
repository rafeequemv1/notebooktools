<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NotebookTools</title>
    <link rel="stylesheet" href="shared.css">
  </head>
  <body>
    <main class="app">
      <section class="card">
        <div class="brand">
          <img class="brand-logo" src="logo.svg" alt="NotebookTools" width="168" height="20">
          <p class="brand-tagline">Import YouTube videos into NotebookLM.</p>
        </div>

        <label for="notebookLmSelect">NotebookLM notebook</label>
        <select id="notebookLmSelect">
          <option value="">Loading NotebookLM notebooks...</option>
        </select>

        <label for="newNotebookLmName">New notebook name</label>
        <input id="newNotebookLmName" type="text" placeholder="Example: Video research">

        <button class="button" id="importYouTubeButton" type="button">
          Import current YouTube video
        </button>

        <button class="button secondary compact" id="refreshNotebookLmButton" type="button">
          Refresh notebooks
        </button>

        <a class="button secondary compact" href="https://notebooklm.google.com/" target="_blank" rel="noreferrer">
          Open NotebookLM
        </a>

        <div class="status" id="status" role="status"></div>
        <p class="hint">
          Open a YouTube video, then import it here or use the in-page NotebookTools button.
          Uses your signed-in NotebookLM browser session.
        </p>
      </section>
    </main>

    <script src="utils.js"></script>
    <script src="notebooklm-client.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
