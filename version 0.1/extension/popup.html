<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NotebookTools</title>
    <link rel="stylesheet" href="shared.css">
  </head>
  <body>
    <main class="app">
      <section class="card">
        <div class="brand">
          <img class="brand-logo" src="logo.svg" alt="NotebookTools" width="148" height="18">
          <p class="brand-tagline" id="pageContext">Import to NotebookLM</p>
        </div>

        <div class="import-modes" role="tablist" aria-label="Import type">
          <button class="import-mode is-active" id="modeWebpage" type="button" data-mode="webpage">Webpage</button>
          <button class="import-mode" id="modeYouTube" type="button" data-mode="youtube">YouTube</button>
          <button class="import-mode" id="modeText" type="button" data-mode="text" hidden>Selected text</button>
        </div>

        <p class="source-preview" id="sourcePreview">Current tab</p>

        <label for="notebookLmSelect">Notebook</label>
        <select id="notebookLmSelect">
          <option value="">Loading notebooks...</option>
        </select>

        <p class="field-divider">or create new</p>

        <input id="newNotebookLmName" type="text" placeholder="Notebook name" aria-label="New notebook name">

        <button class="button" id="importButton" type="button">Import webpage</button>

        <div class="footer-row">
          <button class="text-button" id="refreshNotebookLmButton" type="button">Refresh list</button>
        </div>

        <div class="status" id="status" role="status"></div>
      </section>
    </main>

    <script src="utils.js"></script>
    <script src="notebooklm-client.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
