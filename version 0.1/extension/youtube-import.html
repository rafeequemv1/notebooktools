<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Import to NotebookLM</title>
    <link rel="stylesheet" href="shared.css">
  </head>
  <body>
    <main class="app embedded">
      <section class="card">
        <div class="brand">
          <img class="brand-logo" src="logo.svg" alt="NotebookTools" width="148" height="18">
          <p id="videoTitle" class="brand-tagline">Send this YouTube video to NotebookLM.</p>
        </div>

        <label for="notebookLmSelect">NotebookLM notebook</label>
        <select id="notebookLmSelect">
          <option value="">Loading NotebookLM notebooks...</option>
        </select>

        <label for="newNotebookLmName">New notebook name</label>
        <input id="newNotebookLmName" type="text" placeholder="Example: Video research">

        <button class="button" id="importButton" type="button">
          Import to NotebookLM
        </button>

        <button class="button secondary compact" id="refreshButton" type="button">
          Refresh notebooks
        </button>

        <div class="status" id="status" role="status"></div>
        <p class="hint">
          Uses your signed-in NotebookLM browser session. Open NotebookLM once if
          notebooks do not load.
        </p>
      </section>
    </main>

    <script src="utils.js"></script>
    <script src="notebooklm-client.js"></script>
    <script src="youtube-import.js"></script>
  </body>
</html>
