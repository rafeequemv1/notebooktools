<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Import to NotebookLM</title>
    <link rel="stylesheet" href="shared.css">
  </head>
  <body>
    <main class="app embedded">
      <section class="card">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 20V10C4 10 7 6 12 6C17 6 20 10 20 10V20" stroke="currentColor" stroke-width="2.2" stroke-linecap="square"/>
              <path d="M7 20V12C7 12 9 9 12 9C15 9 17 12 17 12V20" stroke="currentColor" stroke-width="2.2" stroke-linecap="square"/>
              <path d="M10 20V14C10 14 11 12 12 12C13 12 14 14 14 14V20" stroke="currentColor" stroke-width="2.2" stroke-linecap="square"/>
            </svg>
          </span>
          <div>
            <h1>Import video</h1>
            <p id="videoTitle">Send this YouTube video to NotebookLM.</p>
          </div>
        </div>

        <label for="notebookLmSelect">NotebookLM notebook</label>
        <select id="notebookLmSelect">
          <option value="">Loading NotebookLM notebooks...</option>
        </select>

        <label for="newNotebookLmName">New notebook name</label>
        <input id="newNotebookLmName" type="text" placeholder="Example: Video research">

        <button class="button" id="importButton" type="button">
          Import to NotebookLM
        </button>

        <button class="button secondary compact" id="refreshButton" type="button">
          Refresh notebooks
        </button>

        <div class="status" id="status" role="status"></div>
        <p class="hint">
          Uses your signed-in NotebookLM browser session. Open NotebookLM once if
          notebooks do not load.
        </p>
      </section>
    </main>

    <script src="utils.js"></script>
    <script src="notebooklm-client.js"></script>
    <script src="youtube-import.js"></script>
  </body>
</html>
